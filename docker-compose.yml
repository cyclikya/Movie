services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: movie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      DB_HOST: db
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: